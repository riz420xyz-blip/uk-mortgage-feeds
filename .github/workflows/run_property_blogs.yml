name: Run UK Property Blogs Scraper

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4 lxml
      - name: Run scraper
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: python scraper_property_blogs.py
      - name: Commit and push XML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          git diff --staged --quiet || git commit -m "Update property blogs feed $(date -u '+%Y-%m-%d %H:%M')"
          git push
